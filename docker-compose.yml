services:
  db:
    image: postgres:16-alpine
    container_name: camerasync-db
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-camerasync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camerasync}
      POSTGRES_DB: ${POSTGRES_DB:-camerasync}
    ports:
      - "5432:5432"
    volumes:
      - camerasync-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camerasync} -d ${POSTGRES_DB:-camerasync}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./apps/server
    container_name: camerasync-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: ./apps/server/.env
        required: false
    command: sh -c "npm install && npm run dev"
    environment:
      # Forced to the in-network db hostname/credentials regardless of what
      # apps/server/.env has for native (non-docker) dev.
      DATABASE_URL: postgres://${POSTGRES_USER:-camerasync}:${POSTGRES_PASSWORD:-camerasync}@db:5432/${POSTGRES_DB:-camerasync}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/server:/app
      - camerasync-server-modules:/app/node_modules

  web:
    build: ./apps/web
    container_name: camerasync-web
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - path: ./apps/web/.env
        required: false
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - camerasync-web-modules:/app/node_modules

  # One-off: creates/updates tables from schema.sql. Not started by `up`
  # (profiles keeps it out of the default set) — run it explicitly with:
  #   docker compose run --rm db-init
  db-init:
    image: postgres:16-alpine
    container_name: camerasync-db-init
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: ./.env
        required: false
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-camerasync}
      PGPASSWORD: ${POSTGRES_PASSWORD:-camerasync}
      PGDATABASE: ${POSTGRES_DB:-camerasync}
    volumes:
      - ./apps/server/src/db/schema.sql:/schema.sql:ro
    entrypoint: ["psql", "-v", "ON_ERROR_STOP=1", "-f", "/schema.sql"]

volumes:
  camerasync-pgdata:
  camerasync-server-modules:
  camerasync-web-modules:
