name: camerasync_mobile
description: Camera Sync recording app — joins sessions and records on synchronized command.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^2.0.3+1
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  http: ^1.6.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
